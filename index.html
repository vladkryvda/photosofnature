<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Proxy</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #000000;
      --surface: rgba(10, 10, 15, 0.6);
      --border: rgba(255, 255, 255, 0.08);
      --accent: #4a9eff;
      --text: #e8e8f0;
      --muted: #555565;
    }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* Анімація зірок на Canvas */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 750px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      backdrop-filter: blur(8px);
    }

    textarea {
      width: 100%;
      min-height: 120px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9rem;
      line-height: 1.6;
      padding: 18px;
      resize: vertical;
      outline: none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    textarea:focus {
      border-color: rgba(74, 158, 255, 0.4);
      box-shadow: 0 0 20px rgba(74, 158, 255, 0.05);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .loader {
      display: none;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .loader.visible { display: flex; }

    .loader-dots span {
      display: inline-block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1.2); opacity: 1; }
    }

    .send-btn {
      padding: 10px 24px;
      background: none;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .send-btn:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(74, 158, 255, 0.03);
    }

    .send-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .response-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 150px;
      padding: 20px;
      font-size: 0.9rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      transition: border-color 0.4s;
    }

    .response-box.active {
      border-color: rgba(255, 255, 255, 0.15);
    }

    .placeholder-text {
      color: var(--muted);
    }

    .error-msg {
      display: none;
      font-size: 0.8rem;
      color: #ff6b6b;
      padding: 14px;
      background: rgba(255, 107, 107, 0.03);
      border: 1px solid rgba(255, 107, 107, 0.1);
      border-radius: 8px;
    }
    .error-msg.visible { display: block; }

    .copy-btn {
      align-self: flex-end;
      background: none;
      border: none;
      color: var(--muted);
      font-family: inherit;
      font-size: 0.75rem;
      cursor: pointer;
      transition: color 0.2s;
      padding: 4px 0;
      width: fit-content;
    }
    .copy-btn:hover { color: var(--text); }
  </style>
</head>
<body>

<canvas id="stars"></canvas>

<div class="container">

  <!-- Ввід -->
  <textarea id="user-input" placeholder="Запит..."></textarea>
  
  <div class="controls">
    <div class="loader" id="loader">
      <div class="loader-dots"><span></span><span></span><span></span></div>
    </div>
    <button class="send-btn" id="send-btn">Надіслати</button>
  </div>

  <!-- Помилка -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Відповідь -->
  <div class="response-box" id="response-box">
    <span class="placeholder-text" id="placeholder">Чекаю...</span>
  </div>
  
  <button class="copy-btn" id="copy-btn" style="display: none;">копіювати</button>

</div>

<script>
  // --- Ефект зірок (Canvas) ---
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');

  let width = canvas.width = window.innerWidth;
  let height = canvas.height = window.innerHeight;

  const numStars = 120;
  const stars = [];
  let mouse = { x: null, y: null, radius: 70 };

  for (let i = 0; i < numStars; i++) {
    stars.push({
      x: Math.random() * width,
      y: Math.random() * height,
      size: Math.random() * 1.5,
      baseX: 0,
      baseY: 0,
      density: (Math.random() * 15) + 5,
      speed: (Math.random() * 0.05) + 0.01
    });
  }

  window.addEventListener('resize', () => {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  });

  window.addEventListener('mousemove', (e) => {
    mouse.x = e.x;
    mouse.y = e.y;
  });

  window.addEventListener('mouseleave', () => {
    mouse.x = null;
    mouse.y = null;
  });

  function animateStars() {
    ctx.clearRect(0, 0, width, height);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';

    for (let i = 0; i < stars.length; i++) {
      let star = stars[i];
      
      // Повільний рух вгору
      star.y -= star.speed;
      if (star.y < 0) {
        star.y = height;
        star.x = Math.random() * width;
      }

      // Інтерактив з мишкою (зірки злегка тікають)
      if (mouse.x !== null && mouse.y !== null) {
        let dx = mouse.x - star.x;
        let dy = mouse.y - star.y;
        let distance = Math.hypot(dx, dy);
        
        if (distance < mouse.radius) {
          let force = (mouse.radius - distance) / mouse.radius;
          let directionX = dx / distance;
          let directionY = dy / distance;
          
          star.x -= directionX * force * star.density * 0.2;
          star.y -= directionY * force * star.density * 0.2;
        }
      }

      ctx.beginPath();
      ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
      ctx.fill();
    }
    requestAnimationFrame(animateStars);
  }
  animateStars();


  // --- Логіка запитів (Фіксовано під Gemini) ---
  let responseText = '';
  const currentModel = 'gemini-3-flash'; // Жорстко зафіксована модель Gemini

  document.getElementById('send-btn').addEventListener('click', sendRequest);
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendRequest();
    }
  });

  async function sendRequest() {
    const input = document.getElementById('user-input').value.trim();
    if (!input) return;

    const btn = document.getElementById('send-btn');
    const loader = document.getElementById('loader');
    const responseBox = document.getElementById('response-box');
    const placeholder = document.getElementById('placeholder');
    const errorMsg = document.getElementById('error-msg');
    const copyBtn = document.getElementById('copy-btn');

    btn.disabled = true;
    loader.classList.add('visible');
    errorMsg.classList.remove('visible');
    responseBox.classList.add('active');
    copyBtn.style.display = 'none';
    if (placeholder) placeholder.style.display = 'none';
    
    responseBox.textContent = '';
    responseText = '';

    try {
      // Зверніть увагу: шлях змінено на ваш поточний проксі-ендпоінт /api/proxy
      const res = await fetch('/api/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: input, model: currentModel })
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Помилка отримання відповіді');

      // Обробка ключа reply або text залежно від архітектури вашого бекенду
      responseText = data.reply || data.text || '';
      responseBox.textContent = responseText;
      if (responseText) copyBtn.style.display = 'block';

    } catch (err) {
      errorMsg.textContent = 'Помилка: ' + err.message;
      errorMsg.classList.add('visible');
      responseBox.classList.remove('active');
      if (placeholder) placeholder.style.display = 'block';
    } finally {
      btn.disabled = false;
      loader.classList.remove('visible');
    }
  }

  // --- Копіювати ---
  document.getElementById('copy-btn').addEventListener('click', () => {
    if (!responseText) return;
    navigator.clipboard.writeText(responseText);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'скопійовано';
    setTimeout(() => btn.textContent = 'копіювати', 2000);
  });
</script>
</body>
</html>
