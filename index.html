<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Proxy</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent-claude: #cc785c;
      --accent-gemini: #4a9eff;
      --accent-grok: #a259ff;
      --text: #e8e8f0;
      --muted: #555570;
      --active-color: var(--accent-claude);
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    /* Фонова сітка */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    /* Заголовок */
    header {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 span {
      color: var(--active-color);
      transition: color 0.4s;
    }

    .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Вибір моделі */
    .model-selector {
      display: flex;
      gap: 10px;
    }

    .model-btn {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
    }

    .model-btn:hover {
      color: var(--text);
      border-color: #333350;
    }

    .model-btn.active[data-model="claude"] {
      border-color: var(--accent-claude);
      color: var(--accent-claude);
      background: rgba(204,120,92,0.08);
    }
    .model-btn.active[data-model="gemini"] {
      border-color: var(--accent-gemini);
      color: var(--accent-gemini);
      background: rgba(74,158,255,0.08);
    }
    .model-btn.active[data-model="grok"] {
      border-color: var(--accent-grok);
      color: var(--accent-grok);
      background: rgba(162,89,255,0.08);
    }

    .model-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: currentColor;
    }

    /* Поле вводу */
    .input-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.875rem;
      line-height: 1.6;
      padding: 16px;
      resize: vertical;
      outline: none;
      transition: border-color 0.25s;
    }

    textarea:focus {
      border-color: var(--active-color);
    }

    textarea::placeholder {
      color: var(--muted);
    }

    /* Кнопка */
    .send-btn {
      align-self: flex-end;
      padding: 13px 32px;
      background: var(--active-color);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.25s;
      letter-spacing: 0.02em;
    }

    .send-btn:hover:not(:disabled) {
      filter: brightness(1.15);
      transform: translateY(-1px);
    }

    .send-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Поле відповіді */
    .response-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .response-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .response-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      min-height: 180px;
      padding: 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
      transition: border-color 0.4s;
    }

    .response-box.active {
      border-color: var(--active-color);
    }

    .placeholder-text {
      color: var(--muted);
      font-style: italic;
    }

    /* Лоадер */
    .loader {
      display: none;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
    }

    .loader.visible { display: flex; }

    .loader-dots span {
      display: inline-block;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--active-color);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-5px); opacity: 1; }
    }

    /* Помилка */
    .error-msg {
      display: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: #ff6b6b;
      padding: 12px 16px;
      background: rgba(255,107,107,0.08);
      border: 1px solid rgba(255,107,107,0.2);
      border-radius: 8px;
    }
    .error-msg.visible { display: block; }

    /* Копіювати */
    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      padding: 5px 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .copy-btn:hover { color: var(--text); border-color: #333350; }

    /* Активний колір по моделі */
    body[data-model="claude"] { --active-color: var(--accent-claude); }
    body[data-model="gemini"] { --active-color: var(--accent-gemini); }
    body[data-model="grok"]   { --active-color: var(--accent-grok); }
  </style>
</head>
<body data-model="claude">
<div class="container">

  <header>
    <h1>AI <span id="model-name">Claude</span></h1>
    <p class="subtitle">// proxy interface · vercel + api</p>
  </header>

  <!-- Вибір моделі -->
  <div class="model-selector">
    <button class="model-btn active" data-model="claude">
      <span class="model-dot"></span> Claude
    </button>
    <button class="model-btn" data-model="gemini">
      <span class="model-dot"></span> Gemini
    </button>
    <button class="model-btn" data-model="grok">
      <span class="model-dot"></span> Grok
    </button>
  </div>

  <!-- Поле вводу -->
  <div class="input-block">
    <label>// твій запит</label>
    <textarea id="user-input" placeholder="Напиши що завгодно..."></textarea>
    <button class="send-btn" id="send-btn">Надіслати →</button>
  </div>

  <!-- Помилка -->
  <div class="error-msg" id="error-msg"></div>

  <!-- Поле відповіді -->
  <div class="response-block">
    <div class="response-header">
      <label>// відповідь</label>
      <div style="display:flex;align-items:center;gap:12px">
        <div class="loader" id="loader">
          <div class="loader-dots">
            <span></span><span></span><span></span>
          </div>
          думаю...
        </div>
        <button class="copy-btn" id="copy-btn">копіювати</button>
      </div>
    </div>
    <div class="response-box" id="response-box">
      <span class="placeholder-text" id="placeholder">Тут зʼявиться відповідь...</span>
    </div>
  </div>

</div>

<script>
  let currentModel = 'claude';
  let responseText = '';

  // --- Вибір моделі ---
  document.querySelectorAll('.model-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentModel = btn.dataset.model;
      document.body.dataset.model = currentModel;
      document.getElementById('model-name').textContent =
        currentModel.charAt(0).toUpperCase() + currentModel.slice(1);
    });
  });

  // --- Надіслати запит ---
  document.getElementById('send-btn').addEventListener('click', sendRequest);
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) sendRequest();
  });

  async function sendRequest() {
    const input = document.getElementById('user-input').value.trim();
    if (!input) return;

    const btn = document.getElementById('send-btn');
    const loader = document.getElementById('loader');
    const responseBox = document.getElementById('response-box');
    const placeholder = document.getElementById('placeholder');
    const errorMsg = document.getElementById('error-msg');

    // Скидаємо стан
    btn.disabled = true;
    loader.classList.add('visible');
    errorMsg.classList.remove('visible');
    responseBox.classList.add('active');
    placeholder && placeholder.remove();
    responseBox.textContent = '';
    responseText = '';

    try {
      const res = await fetch('/api/proxy', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: input, model: currentModel })
      });

      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Щось пішло не так');

      responseText = data.reply;
      responseBox.textContent = responseText;

    } catch (err) {
      errorMsg.textContent = '❌ Помилка: ' + err.message;
      errorMsg.classList.add('visible');
      responseBox.textContent = '';
      responseBox.classList.remove('active');
    } finally {
      btn.disabled = false;
      loader.classList.remove('visible');
    }
  }

  // --- Копіювати ---
  document.getElementById('copy-btn').addEventListener('click', () => {
    if (!responseText) return;
    navigator.clipboard.writeText(responseText);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'скопійовано ✓';
    setTimeout(() => btn.textContent = 'копіювати', 2000);
  });
</script>
</body>
</html>
