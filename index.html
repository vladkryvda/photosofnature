<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>AI в бібліотеці</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
    textarea { width: 100%; height: 200px; font-size: 16px; }
    button { padding: 12px 25px; font-size: 18px; margin: 10px 0; }
    #result { margin-top: 20px; padding: 20px; background: #f4f4f4; border-radius: 8px; white-space: pre-wrap; }
    .error { color: red; }
  </style>
</head>
<body>
  <h1>AI Помічник (Gemini)</h1>
  
  <textarea id="prompt" placeholder="Напиши свій запит..."></textarea><br><br>
  <button onclick="sendPrompt()">Надіслати</button>

  <div id="result"></div>

  <script>
    const API_KEY = "AIzaSyA9JaDMQ25csFr3OOrl-NmuM4wEcMykKtk";   // ← встав новий!

    async function sendPrompt() {
      const promptText = document.getElementById("prompt").value.trim();
      const resultDiv = document.getElementById("result");
      
      if (!promptText) {
        resultDiv.innerHTML = '<span class="error">Напиши щось!</span>';
        return;
      }

      resultDiv.textContent = "Думаю...";

      try {
        const response = await fetch(
          `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`,
          {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }] }]
            })
          }
        );

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.error?.message || response.status);
        }

        const data = await response.json();
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Немає відповіді";
        resultDiv.textContent = text;

      } catch (error) {
        console.error(error);
        resultDiv.innerHTML = `<span class="error">Помилка: ${error.message}</span>`;
      }
    }
  </script>
</body>
</html>
